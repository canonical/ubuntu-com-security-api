---
kind: Service
apiVersion: v1
metadata:
  name: ubuntu-com-security-api-notices
spec:
  selector:
    app: ubuntu-com-security-api-notices
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: http

---
kind: Deployment
apiVersion: apps/v1
metadata:
  name: ubuntu-com-security-api-notices
spec:
  replicas: 6
  selector:
    matchLabels:
      app: ubuntu-com-security-api-notices
  template:
    metadata:
      labels:
        app: ubuntu-com-security-api-notices
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - ubuntu-com-security-api-notices
              topologyKey: "kubernetes.io/hostname"
      containers:
        - name: ubuntu-com-security-api-notices
          image: prod-comms.ps5.docker-registry.canonical.com/ubuntu-com-security-api:${TAG_TO_DEPLOY}

          ports:
            - name: http
              containerPort: 80

          env:
            - name: TALISKER_NETWORKS
              value: 10.0.0.0/8

            - name: GUNICORN_TIMEOUT
              value: "90"

            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  key: ubuntu-com-security-api
                  name: secret-keys

            - name: HTTP_PROXY
              value: "http://squid.internal:3128/"

            - name: HTTPS_PROXY
              value: "http://squid.internal:3128/"

            - name: NO_PROXY
              value: ".internal,ubuntu.com,.ubuntu.com,snapcraft.io,.snapcraft.io,jujucharms.com,.jujucharms.com,maas.io,.maas.io,conjure-up.io,.conjure-up.io,netplan.io,.netplan.io,canonical.com,.canonical.com,launchpad.net,.launchpad.net,linuxcontainers.org,.linuxcontainers.org,cloud-init.io,.cloud-init.io,vanillaframework.io,.vanillaframework.io,anbox-cloud.io,.anbox-cloud.io,juju.is,.juju.is,dqlite.io,.dqlite.io,charmhub.io,.charmhub.io"

            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  key: database-url
                  name: usndbreplicatwo

            - name: SENTRY_DSN
              description: "Sentry DSN for error tracking"
              value: "https://88233b54cb8e9f8d8df4ace2349e0b8b@o4510662863749120.ingest.de.sentry.io/4511652407345232"

          readinessProbe:
            httpGet:
              path: /_status/check
              port: 80
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          resources:
            requests:
              ephemeral-storage: 128Mi
            limits:
              ephemeral-storage: 1Gi
              memory: 2G
