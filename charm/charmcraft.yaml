# This file configures Charmcraft.
# See https://juju.is/docs/sdk/charmcraft-config for guidance.

name: ubuntu-security-api

type: charm

bases:
  - build-on:
      - name: ubuntu
        channel: "22.04"
    run-on:
      - name: ubuntu
        channel: "22.04"

# (Required)
summary: ubuntu-security-api

# (Required)
description: |
  This charm provides an API for accessing Ubuntu security data.

extensions:
  - flask-framework

requires:
  postgresql:
    interface: postgresql_client
    optional: false
    limit: 1

config:
  options:
    database:
      type: secret
      description: "Primary connection string"
    replica-one:
      type: secret
      description: "First read-replica connection string"
    replica-two:
      type: secret
      description: "Second read-replica connection string"
    oauth-token-salt:
      type: secret
      description: "Salt used to encode and decode OAuth tokens"
    sentry-dsn:
      type: string
      description: "Sentry DSN for error tracking"
      default: "https://88233b54cb8e9f8d8df4ace2349e0b8b@o4510662863749120.ingest.de.sentry.io/4511652407345232"